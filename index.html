<!DOCTYPE html>
<html lang="ckb" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>کوردمارت — بازاڕی ئۆنلاین</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Naskh+Arabic:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#09090e;--bg2:#111118;--bg3:#18181f;--bg4:#1f1f28;--bg5:#252530;
  --gold:#f0a500;--gold2:#ffbf33;--gd:rgba(240,165,0,.12);
  --t1:#f0ede6;--t2:#9d99a0;--t3:#5a5760;
  --bdr:rgba(240,165,0,.18);--bdr2:rgba(255,255,255,.07);
  --green:#22c55e;--red:#ef4444;--blue:#3b82f6;--amber:#f59e0b;
  --r:14px;--r2:10px;--font:'Noto Naskh Arabic',serif;
  --safe:env(safe-area-inset-bottom,0px);
}
html,body{height:100%;overflow-x:hidden;background:var(--bg);color:var(--t1);font-family:var(--font)}
::-webkit-scrollbar{width:3px}::-webkit-scrollbar-thumb{background:var(--gold);border-radius:3px}

/* TOP NAV */
.topnav{position:fixed;top:0;left:0;right:0;z-index:100;height:58px;display:flex;align-items:center;justify-content:space-between;padding:0 14px;background:rgba(9,9,14,.96);backdrop-filter:blur(20px);border-bottom:1px solid var(--bdr2)}
.nav-logo{font-size:19px;font-weight:700;color:var(--gold);display:flex;align-items:center;gap:5px}
.nav-logo span{color:var(--t1);font-size:16px}
.nav-right{display:flex;gap:7px;align-items:center}
.nbtn{padding:7px 13px;border-radius:var(--r2);font-family:var(--font);font-size:12px;cursor:pointer;border:none;transition:.2s}
.nbtn-ghost{background:transparent;color:var(--t2);border:1px solid var(--bdr2)}
.nbtn-ghost:active{border-color:var(--gold);color:var(--gold)}
.nbtn-gold{background:var(--gold);color:#000;font-weight:700}
.nbtn-gold:active{background:var(--gold2)}
.user-chip{display:flex;align-items:center;gap:5px;background:var(--bg3);border:1px solid var(--bdr2);border-radius:20px;padding:5px 10px 5px 7px;font-size:11px;color:var(--t2)}
.udot{width:7px;height:7px;border-radius:50%;flex-shrink:0}

/* BOTTOM NAV */
.botnav{position:fixed;bottom:0;left:0;right:0;z-index:100;background:rgba(9,9,14,.98);backdrop-filter:blur(20px);border-top:1px solid var(--bdr2);display:flex;padding-bottom:var(--safe)}
.bntab{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:10px 2px;cursor:pointer;transition:.2s;position:relative}
.bntab-ico{font-size:20px;margin-bottom:2px;transition:.2s}
.bntab-lbl{font-size:10px;color:var(--t3);transition:.2s;white-space:nowrap}
.bntab.on .bntab-lbl{color:var(--gold)}
.bntab.on .bntab-ico{transform:translateY(-1px)}
.bnbadge{position:absolute;top:7px;right:calc(50% - 18px);background:var(--red);color:#fff;font-size:9px;padding:1px 5px;border-radius:10px;min-width:16px;text-align:center}

/* MAIN */
.main{padding-top:58px;padding-bottom:calc(70px + var(--safe));min-height:100vh}

/* HERO */
.hero{padding:32px 14px 22px;background:linear-gradient(160deg,#09090e,#13111e,#0e0d17);position:relative;overflow:hidden;text-align:center}
.hero::before{content:'';position:absolute;inset:-60%;background:radial-gradient(ellipse at 65% 40%,rgba(240,165,0,.07) 0%,transparent 55%),radial-gradient(ellipse at 20% 75%,rgba(99,102,241,.04) 0%,transparent 45%);pointer-events:none}
.hero-badge{display:inline-flex;align-items:center;gap:5px;background:var(--gd);border:1px solid var(--bdr);color:var(--gold);padding:4px 12px;border-radius:20px;font-size:11px;margin-bottom:14px}
.hero h1{font-size:clamp(20px,6vw,34px);font-weight:700;line-height:1.35;margin-bottom:8px}
.hero h1 em{color:var(--gold);font-style:normal}
.hero p{color:var(--t2);font-size:12px;margin:0 auto 18px;max-width:300px;line-height:1.7}
.hero-stats{display:grid;grid-template-columns:repeat(4,1fr);gap:7px}
.hstat{background:var(--bg3);border:1px solid var(--bdr2);border-radius:var(--r2);padding:8px 4px;text-align:center}
.hstat-n{font-size:14px;font-weight:700;color:var(--gold)}
.hstat-l{font-size:9px;color:var(--t3);margin-top:1px}

/* FILTERS */
.filters{position:sticky;top:58px;z-index:90;background:rgba(9,9,14,.96);backdrop-filter:blur(10px);border-bottom:1px solid var(--bdr2);padding:9px 14px;display:flex;gap:7px;overflow-x:auto;scrollbar-width:none}
.filters::-webkit-scrollbar{display:none}
.fbtn{padding:5px 13px;border-radius:20px;font-family:var(--font);font-size:11px;cursor:pointer;white-space:nowrap;border:1px solid var(--bdr2);background:transparent;color:var(--t2);transition:.2s;flex-shrink:0}
.fbtn.on{background:var(--gold);color:#000;border-color:var(--gold);font-weight:700}
.fbtn:active:not(.on){border-color:var(--gold);color:var(--gold)}

/* PRODUCT GRID */
.grid-wrap{padding:16px 12px 12px}
.grid-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}
.grid-hdr-t{font-size:15px;font-weight:600}
.grid-cnt{font-size:11px;color:var(--t3)}
.pgrid{display:grid;grid-template-columns:repeat(2,1fr);gap:11px}

/* PRODUCT CARD */
.pcard{background:var(--bg3);border:1px solid var(--bdr2);border-radius:var(--r);overflow:hidden;cursor:pointer;transition:.25s;position:relative;animation:fu .4s ease both}
@keyframes fu{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
.pcard:active{transform:scale(.97);border-color:rgba(240,165,0,.3)}
.pcard-img{width:100%;height:150px;object-fit:cover;display:block;background:var(--bg4)}
.pcard-body{padding:11px}
.pcard-cat{font-size:10px;color:var(--gold);margin-bottom:3px}
.pcard-name{font-size:12px;font-weight:600;margin-bottom:3px;line-height:1.4}
.pcard-seller{font-size:10px;color:var(--t3);margin-bottom:8px}
.pcard-foot{display:flex;justify-content:space-between;align-items:center}
.pcard-price{font-size:14px;font-weight:700;color:var(--gold)}
.pcard-price small{font-size:9px;color:var(--t3);font-weight:400}
.pcard-stk{font-size:9px;color:var(--t3)}
.badge-low{position:absolute;top:7px;right:7px;background:rgba(0,0,0,.78);backdrop-filter:blur(4px);border:1px solid var(--bdr);color:var(--gold);font-size:9px;padding:2px 7px;border-radius:4px}

/* EMPTY */
.empty{text-align:center;padding:48px 20px;color:var(--t3)}
.empty-ico{font-size:48px;margin-bottom:12px}
.empty-t{font-size:15px;font-weight:600;color:var(--t2);margin-bottom:6px}
.empty-s{font-size:12px;line-height:1.6}

/* OVERLAY / BOTTOM SHEET */
.ov{position:fixed;inset:0;z-index:200;background:rgba(0,0,0,.88);backdrop-filter:blur(6px);display:none;align-items:flex-end;justify-content:center;padding-bottom:var(--safe)}
.ov.show{display:flex}
.sheet{background:var(--bg3);border:1px solid var(--bdr);border-radius:22px 22px 0 0;width:100%;max-height:93vh;overflow-y:auto;animation:su .3s ease;padding-bottom:16px;position:relative}
@keyframes su{from{transform:translateY(40px);opacity:0}to{transform:translateY(0);opacity:1}}
.sheet-handle{width:36px;height:4px;background:var(--bg5);border-radius:2px;margin:12px auto 0}
.sheet-close{position:absolute;top:14px;left:14px;background:var(--bg4);border:1px solid var(--bdr2);color:var(--t2);width:30px;height:30px;border-radius:50%;cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;z-index:10}
.sheet-close:active{background:var(--red);color:#fff;border-color:var(--red)}

/* DETAIL */
.det-imgs{display:flex;gap:8px;overflow-x:auto;padding:14px 14px 0;scrollbar-width:none}
.det-imgs::-webkit-scrollbar{display:none}
.det-img-main{width:calc(100vw - 28px);flex-shrink:0;height:220px;object-fit:cover;border-radius:var(--r);background:var(--bg4)}
.det-img-thumb{width:70px;height:70px;object-fit:cover;border-radius:8px;flex-shrink:0;border:2px solid transparent;cursor:pointer;background:var(--bg4)}
.det-img-thumb.on{border-color:var(--gold)}
.det-body{padding:16px}
.det-cat{font-size:11px;color:var(--gold);margin-bottom:5px}
.det-name{font-size:19px;font-weight:700;margin-bottom:4px}
.det-seller{font-size:12px;color:var(--t3);margin-bottom:12px}
.det-desc{font-size:13px;color:var(--t2);line-height:1.75;padding:12px;background:var(--bg2);border-radius:var(--r2);border:1px solid var(--bdr2);margin-bottom:14px}
.price-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px}
.price-box{background:var(--bg2);border:1px solid var(--bdr2);border-radius:var(--r2);padding:11px}
.price-box.ac{background:var(--gd);border-color:var(--bdr)}
.price-lbl{font-size:10px;color:var(--t3);margin-bottom:2px}
.price-val{font-size:16px;font-weight:700;color:var(--gold)}
.price-unit{font-size:10px;color:var(--t3);margin-top:1px}

/* BUTTONS */
.btn{padding:12px 16px;border-radius:var(--r2);font-family:var(--font);font-size:13px;cursor:pointer;border:none;transition:.2s;font-weight:600;text-align:center;display:inline-flex;align-items:center;justify-content:center;gap:6px}
.btn-gold{background:var(--gold);color:#000}
.btn-gold:active{background:var(--gold2)}
.btn-ghost{background:transparent;color:var(--t2);border:1px solid var(--bdr2)}
.btn-ghost:active{border-color:var(--gold);color:var(--gold)}
.btn-green{background:var(--green);color:#fff}
.btn-green:active{opacity:.85}
.btn-red{background:var(--red);color:#fff}
.btn-sm{padding:7px 12px;font-size:12px;border-radius:8px}
.act-row{display:flex;gap:8px}

/* STEPS */
.steps-bar{display:flex;align-items:center;justify-content:center;gap:4px;padding:14px 16px 0}
.sdot{width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0}
.sdot.done{background:var(--green);color:#fff}
.sdot.act{background:var(--gold);color:#000}
.sdot.idle{background:var(--bg4);color:var(--t3);border:1px solid var(--bdr2)}
.sline{flex:1;height:1px;background:var(--bdr2);max-width:40px}
.sline.done{background:var(--green)}

/* FORMS */
.sec-hdr2{padding:16px 16px 4px;font-size:18px;font-weight:700}
.sec-sub{padding:0 16px 12px;font-size:12px;color:var(--t3)}
.sh-body{padding:14px 16px}
.fgrp{display:flex;flex-direction:column;gap:5px;margin-bottom:13px}
.flbl{font-size:12px;color:var(--t2)}
.finp{background:var(--bg2);border:1px solid var(--bdr2);border-radius:var(--r2);padding:11px 14px;color:var(--t1);font-family:var(--font);font-size:14px;outline:none;transition:.2s;width:100%}
.finp:focus{border-color:var(--gold)}
.finp::placeholder{color:var(--t3)}
.frow{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.fdiv{height:1px;background:var(--bdr2);margin:14px 0}
.ftarea{background:var(--bg2);border:1px solid var(--bdr2);border-radius:var(--r2);padding:11px 14px;color:var(--t1);font-family:var(--font);font-size:14px;outline:none;resize:vertical;min-height:70px;width:100%}
.ftarea:focus{border-color:var(--gold)}

/* SLIDER */
.sldr-wrap{margin-bottom:18px}
.sldr-lbl{display:flex;justify-content:space-between;font-size:12px;margin-bottom:8px}
.sldr-lbl span{color:var(--t3)}
.sldr-lbl strong{color:var(--gold)}
input[type=range]{width:100%;height:6px;-webkit-appearance:none;appearance:none;background:linear-gradient(to left,var(--gold) var(--p,0%),var(--bg4) var(--p,0%));border-radius:3px;cursor:pointer;outline:none}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:22px;height:22px;border-radius:50%;background:var(--gold);border:3px solid var(--bg3);box-shadow:0 0 8px rgba(240,165,0,.5);cursor:pointer}

/* INFO BOX */
.info-box{background:var(--bg2);border:1px solid var(--bdr2);border-radius:var(--r2);padding:12px;font-size:12px;color:var(--t2);line-height:1.8;margin-bottom:14px}
.info-box strong{color:var(--t1)}
.info-row{display:flex;justify-content:space-between;padding:9px 0;border-bottom:1px solid var(--bdr2)}
.info-row:last-child{border-bottom:none}
.info-k{font-size:11px;color:var(--t3)}
.info-v{font-size:12px;font-weight:500;max-width:60%;word-break:break-all;text-align:left}

/* ID UPLOAD */
.id-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:4px}
.id-slot{background:var(--bg2);border:2px dashed var(--bdr2);border-radius:var(--r2);aspect-ratio:3/2;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;position:relative;overflow:hidden;transition:.2s}
.id-slot.filled{border-style:solid;border-color:var(--gold)}
.id-slot input{position:absolute;inset:0;opacity:0;cursor:pointer;font-size:100px}
.id-slot-ico{font-size:20px;color:var(--t3);margin-bottom:4px}
.id-slot-lbl{font-size:10px;color:var(--t3);text-align:center;line-height:1.4;padding:0 6px}
.id-slot-prev{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;display:none}
.id-slot.filled .id-slot-prev{display:block}
.id-slot.filled .id-slot-ico,.id-slot.filled .id-slot-lbl{display:none}
.id-check{display:none;font-size:10px;color:var(--green);margin-top:6px;align-items:center;gap:4px}
.id-slot.filled+.id-check{display:flex}

/* TAGS */
.tag{display:inline-flex;align-items:center;gap:4px;font-size:11px;padding:3px 9px;border-radius:20px;font-weight:500}
.tag-gold{background:var(--gd);color:var(--gold);border:1px solid var(--bdr)}
.tag-green{background:rgba(34,197,94,.1);color:var(--green);border:1px solid rgba(34,197,94,.25)}
.tag-amber{background:rgba(245,158,11,.1);color:var(--amber);border:1px solid rgba(245,158,11,.25)}
.tag-blue{background:rgba(59,130,246,.1);color:var(--blue);border:1px solid rgba(59,130,246,.25)}

/* ORDER CARD */
.order-card{background:var(--bg3);border:1px solid var(--bdr2);border-radius:var(--r);padding:14px;margin-bottom:10px}
.order-hdr{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px}
.order-name{font-size:14px;font-weight:600;line-height:1.3}
.order-status{flex-shrink:0;margin-right:8px}
.order-body{font-size:12px;color:var(--t2);line-height:1.7}
.order-footer{display:flex;justify-content:space-between;margin-top:10px;padding-top:10px;border-top:1px solid var(--bdr2)}
.order-price{font-size:15px;font-weight:700;color:var(--gold)}
.order-profit{font-size:12px;color:var(--green)}
.pending-banner{background:linear-gradient(135deg,rgba(245,158,11,.06),rgba(245,158,11,.02));border:1px solid rgba(245,158,11,.2);border-radius:var(--r);padding:14px;margin-bottom:14px;display:flex;gap:12px;align-items:flex-start}
.pb-ico{font-size:28px;flex-shrink:0}
.pb-t{font-size:13px;font-weight:600;color:var(--amber);margin-bottom:3px}
.pb-s{font-size:11px;color:var(--t3);line-height:1.6}

/* MSG CARD */
.msg-card{background:var(--bg3);border:1px solid var(--bdr2);border-radius:var(--r);padding:14px;margin-bottom:10px;position:relative}
.msg-card.unread{border-color:rgba(240,165,0,.3)}
.msg-from{font-size:11px;color:var(--gold);margin-bottom:4px}
.msg-time{font-size:10px;color:var(--t3);position:absolute;top:12px;left:12px}
.msg-text{font-size:13px;color:var(--t1);line-height:1.7}
.msg-dot{width:8px;height:8px;border-radius:50%;background:var(--gold);box-shadow:0 0 6px var(--gold);position:absolute;top:14px;right:14px}

/* PROFILE */
.profile-header{background:linear-gradient(135deg,var(--bg3),var(--bg2));border:1px solid var(--bdr2);border-radius:var(--r);padding:20px;margin-bottom:14px;text-align:center}
.profile-avatar{width:64px;height:64px;border-radius:50%;background:var(--gd);border:2px solid var(--bdr);display:flex;align-items:center;justify-content:center;font-size:28px;margin:0 auto 12px}
.profile-name{font-size:18px;font-weight:700;margin-bottom:4px}
.profile-email{font-size:12px;color:var(--t3)}
.stat-row{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:14px}
.stat-item{background:var(--bg3);border:1px solid var(--bdr2);border-radius:var(--r2);padding:14px;text-align:center}
.stat-n{font-size:18px;font-weight:700}
.stat-l{font-size:10px;color:var(--t3);margin-top:2px}

/* AUTH */
.atabs{display:flex;border-bottom:1px solid var(--bdr2)}
.atab{flex:1;padding:13px;text-align:center;cursor:pointer;font-size:13px;font-weight:600;color:var(--t3);border-bottom:2px solid transparent;transition:.2s}
.atab.on{color:var(--gold);border-bottom-color:var(--gold)}

/* PENDING BOTTOM BAR */
.pbar{position:fixed;bottom:calc(70px + var(--safe));left:0;right:0;z-index:99;background:linear-gradient(90deg,#150f00,#201600);border-top:2px solid var(--amber);padding:10px 14px;display:none;gap:10px;align-items:center}
.pbar-t{font-size:12px;font-weight:600;color:var(--amber)}
.pbar-s{font-size:10px;color:var(--t3)}
.pbar-tag{margin-right:auto;font-size:10px;color:var(--amber);background:rgba(245,158,11,.1);border:1px solid rgba(245,158,11,.25);padding:3px 9px;border-radius:20px;flex-shrink:0}

/* TOAST */
.toast{position:fixed;top:66px;right:12px;left:12px;z-index:999;background:var(--bg3);border:1px solid var(--green);color:var(--green);padding:11px 14px;border-radius:var(--r2);font-size:12px;box-shadow:0 4px 20px rgba(0,0,0,.5);display:none;align-items:center;gap:8px;animation:fdn .3s ease}
@keyframes fdn{from{transform:translateY(-10px);opacity:0}to{transform:translateY(0);opacity:1}}

/* SUCCESS SHEET */
.suc-body{padding:44px 20px;text-align:center}
.suc-ico{font-size:56px;margin-bottom:14px;animation:pop .4s ease}
@keyframes pop{from{transform:scale(.5);opacity:0}to{transform:scale(1);opacity:1}}
.suc-t{font-size:19px;font-weight:700;margin-bottom:8px}
.suc-s{font-size:13px;color:var(--t2);line-height:1.7;margin-bottom:20px}

/* FOOTER */
.footer{background:var(--bg2);border-top:1px solid var(--bdr2);padding:20px 14px;text-align:center;color:var(--t3);font-size:11px}
.footer strong{color:var(--gold)}

/* SECTION PADS */
.sec{padding:0 14px 14px}
.sec-title{font-size:16px;font-weight:600;padding:14px 14px 10px}
</style>
</head>
<body>

<!-- TOP NAV -->
<nav class="topnav">
  <div class="nav-logo">🛒 <span>کوردمارت</span></div>
  <div class="nav-right" id="navRight">
    <button class="nbtn nbtn-ghost" onclick="openAuth('login')">چوونەژوورەوە</button>
    <button class="nbtn nbtn-gold" onclick="openAuth('register')">تۆمارکردن</button>
  </div>
</nav>

<!-- MAIN -->
<div class="main" id="mainContent"></div>

<!-- PENDING BAR -->
<div class="pbar" id="pbar">
  <div style="font-size:20px;flex-shrink:0">⏳</div>
  <div><div class="pbar-t">ئەکاونتەکەت چاوەڕێی پەسەندکردنە</div><div class="pbar-s">دەتوانیت ببینیت بەڵام فرۆشتن ناتوانیت تا وەرگیریت</div></div>
  <div class="pbar-tag">چاوەڕوانی</div>
</div>

<!-- BOTTOM NAV -->
<nav class="botnav" id="botnav">
  <div class="bntab on" id="tab_home" onclick="setTab('home')">
    <div class="bntab-ico">🏠</div>
    <div class="bntab-lbl">سەرەکی</div>
  </div>
  <div class="bntab" id="tab_orders" onclick="setTab('orders')">
    <div class="bntab-ico">🛍</div>
    <div class="bntab-lbl">فرۆشراوەکانم</div>
    <div class="bnbadge" id="ordersBadge" style="display:none">0</div>
  </div>
  <div class="bntab" id="tab_msgs" onclick="setTab('msgs')">
    <div class="bntab-ico">💬</div>
    <div class="bntab-lbl">نامەکان</div>
    <div class="bnbadge" id="msgsBadge" style="display:none">0</div>
  </div>
  <div class="bntab" id="tab_profile" onclick="setTab('profile')">
    <div class="bntab-ico">👤</div>
    <div class="bntab-lbl">پڕۆفایل</div>
  </div>
</nav>

<!-- OVERLAY -->

<script>

const DB = {
  get: k => { try { return JSON.parse(localStorage.getItem('km_'+k)||'[]') } catch { return [] } },
  getOne: (k,id) => DB.get(k).find(x=>x.id===id),
  set: (k,v) => localStorage.setItem('km_'+k, JSON.stringify(v)),
  nextId: k => { const a = DB.get(k); return a.length ? Math.max(...a.map(i=>i.id||0))+1 : 1; }
};
const fmt = n => Number(n||0).toLocaleString('ar-IQ');
const el = id => document.getElementById(id);
const ts = () => new Date().toISOString();
const fmtDate = s => s ? new Date(s).toLocaleDateString('ar-IQ',{year:'numeric',month:'short',day:'numeric',hour:'2-digit',minute:'2-digit'}) : '—';

// ═══════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════
let user = null;

// ── SESSION HELPERS ──
function saveSession(u) { localStorage.setItem('km_session', u ? JSON.stringify(u) : ''); }
function loadSession() {
  try {
    const s = localStorage.getItem('km_session');
    if(!s) return null;
    const saved = JSON.parse(s);
    // Re-fetch fresh data from sellers list (in case approved status changed)
    const fresh = DB.get('sellers').find(x=>x.id===saved.id);
    return fresh || saved;
  } catch { return null; }
}
let activeTab = 'home';
let activeCat = 'هەموو';
let selProd = null;
let finalPrice = 0;
const CATS = ['هەموو','زێوەلا','جل و بەرگ','عەتر','تەکنەلۆژیا','کتێب','جوانکاری','پێلاو','خواردنی ئامادە'];

// ═══════════════════════════════════════════
// HELPERS
// ═══════════════════════════════════════════
function showToast(msg, isErr) {
  const t = el('toast');
  t.style.borderColor = isErr ? 'var(--red)' : 'var(--green)';
  t.style.color = isErr ? 'var(--red)' : 'var(--green)';
  t.innerHTML = (isErr ? '✕ ' : '✓ ') + msg;
  t.style.display = 'flex';
  clearTimeout(t._to);
  t._to = setTimeout(()=>t.style.display='none', 3000);
}
function openOv(html) { el('sheetBody').innerHTML=html; el('ov').classList.add('show'); document.body.style.overflow='hidden'; }
function closeOv() { el('ov').classList.remove('show'); document.body.style.overflow=''; }
function ovOut(e) { if(e.target===el('ov')) closeOv(); }
function compressImage(file, cb) {
  const reader = new FileReader();
  reader.onload = e => {
    const img = new Image();
    img.onload = () => {
      const c = document.createElement('canvas');
      const max = 400; let w=img.width, h=img.height;
      if(w>max){h=h*max/w;w=max;} if(h>max){w=w*max/h;h=max;}
      c.width=w; c.height=h;
      c.getContext('2d').drawImage(img,0,0,w,h);
      cb(c.toDataURL('image/jpeg',0.72));
    };
    img.src = e.target.result;
  };
  reader.readAsDataURL(file);
}

// ═══════════════════════════════════════════
// NAV & TABS
// ═══════════════════════════════════════════
function renderNav() {
  if(user) {
    el('navRight').innerHTML = `
      <div class="user-chip">
        <div class="udot" style="background:${user.approved?'var(--green)':'var(--amber)'};box-shadow:0 0 5px ${user.approved?'var(--green)':'var(--amber)'}"></div>

    el('pbar').style.display = user.approved ? 'none' : 'flex';

    el('navRight').innerHTML = `
      <button class="nbtn nbtn-ghost" onclick="openAuth('login')">چوونەژوورەوە</button>
      <button class="nbtn nbtn-gold" onclick="openAuth('register')">تۆمارکردن</button>`;

  updateBadges();
}

function setTab(tab) {
  activeTab = tab;
  localStorage.setItem('km_tab', tab);
  ['home','orders','msgs','profile'].forEach(t => el('tab_'+t)?.classList.toggle('on', t===tab));

}

function updateBadges() {
  if(!user) { el('ordersBadge').style.display='none'; el('msgsBadge').style.display='none'; return; }
  const myOrders = DB.get('orders').filter(o=>o.sellerId===user.id);
  const ob = el('ordersBadge');
  if(ob){ const pend=myOrders.filter(o=>o.status!=='done').length; ob.style.display=pend?'block':'none'; ob.textContent=pend; }
  const myMsgs = DB.get('messages').filter(m=>(m.toId==='all'||m.toId===user.id)&&!m.read);
  const mb = el('msgsBadge');
  if(mb){ mb.style.display=myMsgs.length?'block':'none'; mb.textContent=myMsgs.length; }
}

// ═══════════════════════════════════════════
// HOME TAB
// ═══════════════════════════════════════════
function renderHome() {
  const prods = DB.get('products');
  const filtered = activeCat==='هەموو' ? prods : prods.filter(p=>p.cat===activeCat);
  el('mainContent').innerHTML = `
    ${renderHero()}
    <div class="filters" id="filtersBar">${CATS.map(c=>`<button class="fbtn ${c===activeCat?'on':''}" onclick="setCat('${c}')">${c}</button>`).join('')}</div>
    <div class="grid-wrap">
      <div class="grid-hdr">
        <div class="grid-hdr-t">کاڵاکان</div>

      </div>
      ${filtered.length ? `<div class="pgrid">${filtered.map((p,i)=>productCard(p,i)).join('')}</div>` : `
        <div class="empty">
          <div class="empty-ico">📦</div>
          <div class="empty-t">${activeCat==='هەموو'?'هیچ کاڵایەک زیادنەکراوە':'هیچ کاڵایەک لەم جۆرەدا نییە'}</div>
          <div class="empty-s">${activeCat==='هەموو'?'ئەدمین دەبێت سەرەتا کاڵا زیاد بکات':'جۆری تر هەڵبژێرە'}</div>
        </div>`}
    </div>
    <footer class="footer"><strong>کوردمارت</strong> — پلاتفۆرمی فرۆشتنی ئۆنلاینی کوردستان<br><span style="font-size:10px;color:var(--t3)">© ٢٠٢٤ هەموو مافەکان پارێزراون</span></footer>`;
}

function renderHero() {
  const sellers = DB.get('sellers');
  const orders = DB.get('orders');
  return `<section class="hero">
    <div class="hero-badge">✦ پلاتفۆرمی فرۆشتنی کوردستان</div>
    <h1>بازاڕی ئۆنلاینی<br><em>کوردمارت</em></h1>
    <p>کاڵاکانی کوردستان بگۆڕین بە مارکی جیهانی</p>
    <div class="hero-stats">
      <div class="hstat"><div class="hstat-n">${DB.get('products').length}</div><div class="hstat-l">کاڵا</div></div>
      <div class="hstat"><div class="hstat-n">${sellers.filter(s=>s.approved).length}</div><div class="hstat-l">فرۆشیار</div></div>
      <div class="hstat"><div class="hstat-n">${orders.length}</div><div class="hstat-l">فرۆشتن</div></div>
      <div class="hstat"><div class="hstat-n">٣</div><div class="hstat-l">پارێزگا</div></div>
    </div>
  </section>`;
}

function productCard(p, i) {
  return `
  <div class="pcard" style="animation-delay:${i*0.06}s" onclick="openDetail(${p.id})">
    ${(p.stock||0)<15?'<div class="badge-low">!کەم</div>':''}
    <img src="${p.images?.[0]||''}" class="pcard-img" loading="lazy" onerror="this.style.background='var(--bg4)'">
    <div class="pcard-body">
      <div class="pcard-cat">${p.cat}</div>
      <div class="pcard-name">${p.name}</div>
      <div class="pcard-foot">
        <div class="pcard-price">${fmt(p.price)} <small>د.ع</small></div>
        <div class="pcard-stk ${(p.stock||0)<15?'stk-low':''}">${p.stock} دانە</div>
      </div>
    </div>
  </div>`;
}

function setCat(c) { activeCat=c; renderHome(); }

// ═══════════════════════════════════════════
// PRODUCT DETAIL
// ═══════════════════════════════════════════
function openDetail(id) {
  selProd = DB.get('products').find(p=>p.id===id);
  if(!selProd) return;
  const imgs = (selProd.images||[]).filter(Boolean);
  const canSell = user?.approved;
  const pending = user && !user.approved;
  let actionBtn = '';
  if(canSell) actionBtn=`<button class="btn btn-gold" style="flex:1" onclick="openPricing()">💰 نرخدانان و فرۆشتن</button>`;
  else if(pending) actionBtn=`<button class="btn btn-ghost" style="flex:1;opacity:.45" disabled>⏳ چاوەڕووی پەسەندکردن</button>`;
  else actionBtn=`<button class="btn btn-gold" style="flex:1" onclick="closeOv();openAuth('register')">تۆمار بکە بۆ فرۆشتن</button>`;

  openOv(`
    ${imgs.length>1?`<div class="det-imgs" id="detImgs">${imgs.map((img,i)=>`<img src="${img}" class="det-img-main" style="${i>0?'display:none':''}" id="dimg${i}"><img src="${img}" class="det-img-thumb${i===0?' on':''}" onclick="switchImg(${i})" onerror="this.style.display='none'">`).join('')}</div>`:imgs[0]?`<img src="${imgs[0]}" style="width:100%;height:220px;object-fit:cover" onerror="this.style.display='none'">`:``}
    <div class="det-body">
      <div class="det-cat">${selProd.cat}</div>
      <div class="det-name">${selProd.name}</div>
      <div class="det-seller" style="margin-bottom:12px">📦 ${selProd.stock} دانە ماوە</div>
      ${selProd.desc?`<div class="det-desc">${selProd.desc}</div>`:''}
      <div class="price-row">
        <div class="price-box ac"><div class="price-lbl">نرخی بنەڕەت</div><div class="price-val">${fmt(selProd.price)}</div><div class="price-unit">دینار عێراقی</div></div>
        <div class="price-box"><div class="price-lbl">مانای بەرگ</div><div class="price-val" style="color:var(--t1)">${selProd.stock}</div><div class="price-unit">دانە</div></div>
      </div>
      <div class="act-row">
        ${actionBtn}
        <button class="btn btn-ghost" onclick="closeOv()">داخستن</button>
      </div>
    </div>`);
}

function switchImg(idx) {
  const imgs = (selProd?.images||[]).filter(Boolean);
  imgs.forEach((_,i) => {
    const m = el('dimg'+i);
    if(m) m.style.display = i===idx?'block':'none';
    const t = document.querySelectorAll('.det-img-thumb')[i];
    if(t) t.classList.toggle('on', i===idx);
  });
}

// ═══════════════════════════════════════════
// PRICING
// ═══════════════════════════════════════════
function openPricing() {
  openOv(`
    <div class="steps-bar">
      <div class="sdot act">١</div><div class="sline"></div>
      <div class="sdot idle">٢</div>
    </div>
    <div style="font-size:28px;text-align:center;padding:14px 0 4px">💰</div>
    <div class="sec-hdr2">نرخدانان ڕاستەوخۆ</div>
    <div class="sec-sub">نرخی کاڵاکە دیاری بکە و قازانجی خۆت زیاد بکە</div>
    <div class="sh-body">
      <div class="price-row">
        <div class="price-box"><div class="price-lbl">نرخی ڕاستەقینە</div><div class="price-val">${fmt(selProd.price)}</div><div class="price-unit">دینار</div></div>
        <div class="price-box"><div class="price-lbl">قازانجی تۆ</div><div class="price-val" id="pMarkup" style="color:var(--green)">٠</div><div class="price-unit">زیادی</div></div>
        <div class="price-box ac" style="grid-column:1/-1"><div class="price-lbl">نرخی کۆتایی بۆ کڕیار</div><div class="price-val" id="pFinal" style="font-size:20px">${fmt(selProd.price)}</div><div class="price-unit">دینار عێراقی</div></div>
      </div>
      <div class="sldr-wrap">
        <div class="sldr-lbl"><span>بەرزکردنەوەی نرخ</span><strong id="sldrV">٠ د.ع +</strong></div>
        <input type="range" min="0" max="10000" step="500" value="0" id="priceSlider" oninput="onSlider(this)">
        <div style="display:flex;justify-content:space-between;margin-top:5px;font-size:10px;color:var(--t3)"><span>٠</span><span>+١٠,٠٠٠ بەرزترین</span></div>
      </div>
      <div class="info-box">
        <strong>ئەگەری ئەمە پابەند دەبیت:</strong><br>
        نرخی ڕاستەقینە: <strong>${fmt(selProd.price)} د.ع</strong><br>
        بەرزکردنەوەت: <strong id="ib_m" style="color:var(--gold)">٠ د.ع</strong><br>
        نرخی کۆتایی: <strong id="ib_f" style="color:var(--green)">${fmt(selProd.price)} د.ع</strong><br>
        قازانجی تۆ: <strong id="ib_p" style="color:var(--blue)">٠ د.ع</strong>
      </div>
      <button class="btn btn-gold" style="width:100%" onclick="onPricingAgree()">✅ I agree — بەرپیش بڕۆ</button>
    </div>`);
}

function onSlider(inp) {
  const v = Number(inp.value);
  const fp = selProd.price + v;
  inp.style.setProperty('--p', (v/10000*100)+'%');
  el('pMarkup').textContent='+'+fmt(v); el('pFinal').textContent=fmt(fp);
  el('sldrV').textContent=fmt(v)+' د.ع +'; el('ib_m').textContent=fmt(v)+' د.ع';
  el('ib_f').textContent=fmt(fp)+' د.ع'; el('ib_p').textContent=fmt(v)+' د.ع';
}

function onPricingAgree() {
  const v = Number(el('priceSlider')?.value||0);
  finalPrice = selProd.price + v;
  openShipping();
}

// SHIPPING
// ═══════════════════════════════════════════
function openShipping() {
  openOv(`
    <div class="steps-bar">
      <div class="sdot done">✓</div><div class="sline done"></div>
      <div class="sdot act">٢</div>
    </div>
    <div style="font-size:28px;text-align:center;padding:14px 0 4px">📦</div>
    <div class="sec-hdr2">ناردنی کاڵا</div>
    <div class="sec-sub">زانیاری کڕیار بنووسە</div>
    <div class="sh-body">
      <div style="background:var(--gd);border:1px solid var(--bdr);border-radius:var(--r2);padding:11px;margin-bottom:14px;display:flex;justify-content:space-between;align-items:center">
        <span style="font-size:12px;color:var(--t2)">${selProd.name}</span>
        <span style="color:var(--gold);font-weight:700;font-size:13px">${fmt(finalPrice)} د.ع</span>
      </div>
      <div class="fgrp"><label class="flbl">ناوی کڕیار *</label><input class="finp" id="sh_name" placeholder="ناوی تەواو"></div>
      <div class="frow">
        <div class="fgrp"><label class="flbl">مۆبایل ١ *</label><input class="finp" id="sh_p1" placeholder="07xxxxxxxxx"></div>
        <div class="fgrp"><label class="flbl">مۆبایل ٢</label><input class="finp" id="sh_p2" placeholder="ئەختیاری"></div>
      </div>
      <div class="fgrp"><label class="flbl">ناونیشان *</label><input class="finp" id="sh_addr" placeholder="شار، گەڕەک، کوچە، ژمارە"></div>
      <div class="fdiv"></div>
      <div class="info-box" id="sh_prev">ناوی کڕیار، ژمارەی مۆبایل و ناونیشان بنووسە...</div>
      <button class="btn btn-green" style="width:100%" onclick="onShippingSubmit()">✅ I agree — تۆمارکردنی داواکاری</button>
    </div>`);

  ['sh_name','sh_p1','sh_p2','sh_addr'].forEach(id=>{ const i=el(id); if(i) i.addEventListener('input',updateShPrev); });
}

function updateShPrev() {
  const n=el('sh_name')?.value||'—', p1=el('sh_p1')?.value||'—', p2=el('sh_p2')?.value, a=el('sh_addr')?.value||'—';
  const pv=el('sh_prev');
  if(pv) pv.innerHTML=`<strong>پشتڕاستکردنەوە:</strong><br>ناو: <strong>${n}</strong> &nbsp; مۆبایل: <strong>${p1}${p2?' / '+p2:''}</strong><br>ناونیشان: <strong>${a}</strong>`;
}

function onShippingSubmit() {
  const n=el('sh_name')?.value?.trim(), p1=el('sh_p1')?.value?.trim(), a=el('sh_addr')?.value?.trim();
  if(!n||!p1||!a){showToast('تکایە خانەی پێویست پڕ بکەرەوە', true); return;}
  const p2=el('sh_p2')?.value?.trim();
  const markup = finalPrice - selProd.price;

  // Save order
  const orders = DB.get('orders');
  orders.push({
    id: DB.nextId('orders'),
    productId: selProd.id,
    productName: selProd.name,
    sellerId: user.id,
    sellerName: user.name,
    basePrice: selProd.price,
    finalPrice: finalPrice,
    profit: markup,
    buyerName: n,
    phone1: p1,
    phone2: p2||'',
    address: a,
    status: 'pending',
    createdAt: ts()
  });
  DB.set('orders', orders);

  // Show success
  openOv(`
    <div class="suc-body">
      <div class="suc-ico">🎉</div>
      <div class="suc-t">داواکاریەکەت تۆمارکرا!</div>
      <div class="suc-s">فرۆشتنەکەت بە سەرکەوتویی تۆمارکرا.<br>لە <strong style="color:var(--gold)">فرۆشراوەکانم</strong> دەتوانیت بچۆیت ببینیتیەوە.<br><span style="color:var(--amber)">چاوەڕێ بکە تا تیمەکە کارەکانت تەواو دەکات.</span></div>
      <div style="display:flex;gap:10px;justify-content:center">
        <button class="btn btn-ghost" onclick="closeOv()">داخستن</button>
        <button class="btn btn-gold" onclick="closeOv();setTab('orders')">فرۆشراوەکانم ببینە</button>
      </div>
    </div>`);

  updateBadges();
}

// ═══════════════════════════════════════════
// MY ORDERS TAB
// ═══════════════════════════════════════════
function renderMyOrders() {
  if(!user) { el('mainContent').innerHTML=`<div class="empty" style="margin-top:60px"><div class="empty-ico">🛍</div><div class="empty-t">تۆمار بکە یان بچۆ ژوورەوە</div><div class="empty-s">پێویستە ئەکاونتت هەبێت بۆ بینینی فرۆشتنەکانت</div><button class="btn btn-gold" style="margin-top:16px;min-width:160px" onclick="openAuth('register')">تۆمارکردن</button></div>`; return; }
  const myOrders = DB.get('orders').filter(o=>o.sellerId===user.id);

        <div class="stat-item"><div class="stat-n" style="color:var(--gold);font-size:14px">${fmt(total)}</div><div class="stat-l">کۆی نرخ (د.ع)</div></div>
        <div class="stat-item"><div class="stat-n" style="color:var(--green);font-size:14px">${fmt(profit)}</div><div class="stat-l">کۆی قازانج</div></div>
      </div>`:''}
      ${myOrders.length ? [...myOrders].reverse().map(o=>`
      <div class="order-card">
        <div class="order-hdr">
          <div class="order-name">${o.productName}</div>
          <span class="tag ${o.status==='done'?'tag-green':'tag-amber'}">${o.status==='done'?'✓ تەواوبوو':'⏳ چاوەڕوانی'}</span>
        </div>
        ${o.status!=='done'?`
        <div class="pending-banner" style="padding:10px;margin-bottom:10px">
          <div class="pb-ico">⏳</div>
          <div><div class="pb-t">چاوەڕێ بکە تا تیمەکە کارەکانت تەواو دەکات</div><div class="pb-s">داواکاریەکەت وەرگیراوە — بەم زووییەوە پەیوەندیت دەکرێت</div></div>
        </div>`:''}
        <div class="order-body">
          کڕیار: <strong>${o.buyerName}</strong><br>

          ناونیشان: <strong>${o.address}</strong><br>
          <span style="color:var(--t3);font-size:10px">${fmtDate(o.createdAt)}</span>
        </div>
        <div class="order-footer">
          <div class="order-price">${fmt(o.finalPrice)} <small style="font-size:10px;color:var(--t3);font-weight:400">د.ع</small></div>
          <div class="order-profit">+${fmt(o.profit)} د.ع قازانج</div>
        </div>
      </div>`).join('') : `
      <div class="empty">
        <div class="empty-ico">🛍</div>
        <div class="empty-t">هیچ فرۆشتنێکت نییە هێشتا</div>
        <div class="empty-s">بچۆ سەرەکی و کاڵایەک هەڵبژێرە بۆ فرۆشتن</div>
        <button class="btn btn-gold" style="margin-top:14px;min-width:140px" onclick="setTab('home')">🏠 بڕۆ سەرەکی</button>
      </div>`}
    </div>`;
  updateBadges();
}

// ═══════════════════════════════════════════
// MESSAGES TAB
// ═══════════════════════════════════════════
function renderMsgs() {
  if(!user){ el('mainContent').innerHTML=`<div class="empty" style="margin-top:60px"><div class="empty-ico">💬</div><div class="empty-t">تۆمار بکە بۆ بینینی نامەکان</div></div>`; return; }
  const msgs = DB.get('messages').filter(m=>m.toId==='all'||m.toId===user.id);
  // Mark as read
  const allMsgs = DB.get('messages');
  allMsgs.forEach(m=>{ if(m.toId==='all'||m.toId===user.id) m.read=true; });
  DB.set('messages', allMsgs);
  el('mainContent').innerHTML = `
    <div class="sec-title">💬 نامەکان</div>
    <div class="sec">
      ${msgs.length ? [...msgs].reverse().map(m=>`
      <div class="msg-card">
        <div class="msg-from">📢 کوردمارت — تیمی بەڕێوەبردن</div>
        <div class="msg-time">${fmtDate(m.createdAt)}</div>
        <div class="msg-text" style="margin-top:8px">${m.text}</div>
      </div>`).join('') : `
      <div class="empty">
        <div class="empty-ico">💬</div>
        <div class="empty-t">هیچ نامەیەک نییە</div>
        <div class="empty-s">کاتێک ئەدمین نامەیەک ناردی ئێرە دەردەکەوێت</div>
      </div>`}
    </div>`;
  updateBadges();
}

// ═══════════════════════════════════════════
// PROFILE TAB
// ═══════════════════════════════════════════
function renderProfile() {
  if(!user) {
    el('mainContent').innerHTML = `
      <div class="empty" style="margin-top:60px">
        <div class="empty-ico">👤</div>
        <div class="empty-t">تۆمار بکە یان بچۆ ژوورەوە</div>
        <div class="empty-s">بۆ بینینی زانیاریەکانت پێویستت بە ئەکاونتێکە</div>
        <div style="display:flex;gap:10px;justify-content:center;margin-top:16px">
          <button class="btn btn-ghost btn-sm" onclick="openAuth('login')">چوونەژوورەوە</button>
          <button class="btn btn-gold btn-sm" onclick="openAuth('register')">تۆمارکردن</button>
        </div>
      </div>`; return;
  }
  const myOrders = DB.get('orders').filter(o=>o.sellerId===user.id);
  const totalSales = myOrders.reduce((a,o)=>a+(o.finalPrice||0),0);
  const totalProfit = myOrders.reduce((a,o)=>a+(o.profit||0),0);
  const doneOrders = myOrders.filter(o=>o.status==='done').length;

  el('mainContent').innerHTML = `
    <div class="sec-title">👤 پڕۆفایلی فرۆشیار</div>
    <div class="sec">
      <div class="profile-header">
        <div class="profile-avatar">👤</div>
        <div class="profile-name">${user.name}</div>
        <div class="profile-email">${user.email}</div>
        <div style="margin-top:10px">
          <span class="tag ${user.approved?'tag-green':'tag-amber'}">${user.approved?'✓ فرۆشیاری چالاک':'⏳ چاوەڕووی پەسەندکردن'}</span>
        </div>
        ${!user.approved?`<div class="pending-banner" style="margin-top:14px;text-align:right">
          <div class="pb-ico">⏳</div>
          <div><div class="pb-t">ئەکاونتەکەت چاوەڕێی پەسەندکردنی ئەدمینە</div><div class="pb-s">کاتێک پەسەندکرا دەتوانیت کاڵا بفرۆشیت</div></div>
        </div>`:''}
      </div>
      <div class="stat-row">
        <div class="stat-item"><div class="stat-n" style="color:var(--blue)">${myOrders.length}</div><div class="stat-l">کۆی فرۆشتن</div></div>
        <div class="stat-item"><div class="stat-n" style="color:var(--green);font-size:12px">${fmt(totalProfit)}</div><div class="stat-l">کۆی قازانج</div></div>
        <div class="stat-item"><div class="stat-n" style="color:var(--gold)">${doneOrders}</div><div class="stat-l">تەواوبووە</div></div>
      </div>
      <div class="info-box" style="margin-bottom:14px">
        <div class="info-row"><div class="info-k">ئیمەیڵ</div><div class="info-v">${user.email}</div></div>
        <div class="info-row"><div class="info-k">مۆبایل</div><div class="info-v">${user.phone||'—'}</div></div>
        <div class="info-row"><div class="info-k">کۆی داهات</div><div class="info-v" style="color:var(--gold)">${fmt(totalSales)} د.ع</div></div>
        <div class="info-row" style="border-bottom:none"><div class="info-k">کۆی قازانج</div><div class="info-v" style="color:var(--green)">${fmt(totalProfit)} د.ع</div></div>
      </div>
      <button class="btn btn-ghost" style="width:100%" onclick="logout()">🚪 دەرچوون لە ئەکاونت</button>
    </div>`;
}

// ═══════════════════════════════════════════
// AUTH
// ═══════════════════════════════════════════
let regIdFront = null, regIdBack = null;

function openAuth(tab) { renderAuthSheet(tab); }

function renderAuthSheet(tab) {
  openOv(`
    <div class="atabs">
      <div class="atab ${tab==='register'?'on':''}" onclick="renderAuthSheet('register')">تۆمارکردن</div>
      <div class="atab ${tab==='login'?'on':''}" onclick="renderAuthSheet('login')">چوونەژوورەوە</div>
    </div>
    ${tab==='register' ? regForm() : loginForm()}`);
}

function regForm() {
  regIdFront = null; regIdBack = null;
  return `
  <div class="sh-body">
    <div style="font-size:22px;margin-bottom:4px">👋</div>
    <div style="font-size:16px;font-weight:700;margin-bottom:4px">بەخێربێیت فرۆشیار</div>
    <div style="font-size:11px;color:var(--t3);margin-bottom:16px">ئەکاونتێک دروست بکە و دەستپێبکە</div>
    <div class="fgrp"><label class="flbl">ناوی تەواو *</label><input class="finp" id="r_name" placeholder="ناوی تەواوت بنووسە"></div>
    <div class="fgrp"><label class="flbl">ئیمەیڵ *</label><input class="finp" id="r_email" type="email" placeholder="name@example.com"></div>
    <div class="frow">
      <div class="fgrp"><label class="flbl">مۆبایل *</label><input class="finp" id="r_phone" placeholder="07xxxxxxxxx"></div>
      <div class="fgrp"><label class="flbl">پاسۆرد *</label><input class="finp" id="r_pass" type="password" placeholder="پاسۆرد"></div>
    </div>
    <div class="fgrp">
      <label class="flbl" style="margin-bottom:8px">ناسنامەی کارت *</label>
      <div class="id-grid">
        <div>
          <div class="id-slot" id="idFSlot" onclick="el('idFInp').click()">
            <input type="file" id="idFInp" accept="image/*" style="display:none" onchange="handleIdUpload(event,'front')">
            <div class="id-slot-ico">📷</div>
            <div class="id-slot-lbl"><strong style="color:var(--t2);display:block;margin-bottom:2px">پێشەوەی ناسنامە</strong>کلیک بکە هەڵبژێرە</div>
            <img class="id-slot-prev" id="idFPrev">
          </div>
          <div class="id-check" id="idFOk">✓ زیادکرا</div>
        </div>
        <div>
          <div class="id-slot" id="idBSlot" onclick="el('idBInp').click()">
            <input type="file" id="idBInp" accept="image/*" style="display:none" onchange="handleIdUpload(event,'back')">
            <div class="id-slot-ico">📷</div>
            <div class="id-slot-lbl"><strong style="color:var(--t2);display:block;margin-bottom:2px">پشتی ناسنامە</strong>کلیک بکە هەڵبژێرە</div>
            <img class="id-slot-prev" id="idBPrev">
          </div>
          <div class="id-check" id="idBOk">✓ زیادکرا</div>
        </div>
      </div>
    </div>
    <div class="info-box">
      <strong>ئاگادارکردنەوە:</strong> دوای تۆمارکردن ئەکاونتەکەت دەچێتە دەستی تیمەکەمان بۆ پەسەندکردن.
    </div>
    <button class="btn btn-gold" style="width:100%" onclick="doRegister()">تۆمارکردن — دروستکردنی ئەکاونت</button>
  </div>`;
}

function loginForm() {
  return `
  <div class="sh-body">
    <div style="font-size:22px;margin-bottom:4px">👋</div>
    <div style="font-size:16px;font-weight:700;margin-bottom:4px">بەخێربێیت دووبارە</div>
    <div style="font-size:11px;color:var(--t3);margin-bottom:16px">بچۆ ژوورەوە بۆ ئەکاونتەکەت</div>
    <div class="fgrp"><label class="flbl">ئیمەیڵ</label><input class="finp" id="l_email" type="email" placeholder="name@example.com"></div>
    <div class="fgrp"><label class="flbl">پاسۆرد</label><input class="finp" id="l_pass" type="password" placeholder="پاسۆردەکەت"></div>
    <button class="btn btn-gold" style="width:100%;margin-top:6px" onclick="doLogin()">چوونەژوورەوە</button>
  </div>`;
}

function handleIdUpload(e, side) {
  const file = e.target.files?.[0];
  if(!file) return;
  compressImage(file, b64 => {
    if(side==='front') {
      regIdFront=b64;
      const s=el('idFSlot'), p=el('idFPrev'), ok=el('idFOk');
      if(s) s.classList.add('filled');
      if(p) p.src=b64;
      if(ok) ok.style.display='flex';
    } else {
      regIdBack=b64;
      const s=el('idBSlot'), p=el('idBPrev'), ok=el('idBOk');
      if(s) s.classList.add('filled');
      if(p) p.src=b64;
      if(ok) ok.style.display='flex';
    }
  });
}

function doRegister() {
  const n=el('r_name')?.value?.trim(), em=el('r_email')?.value?.trim();
  const ph=el('r_phone')?.value?.trim(), pw=el('r_pass')?.value?.trim();
  if(!n||!em||!ph||!pw){showToast('تکایە هەموو خانەکان پڕ بکەرەوە',true);return;}
  if(!regIdFront||!regIdBack){showToast('تکایە هەردوو لاپەڕەی ناسنامەکەت زیاد بکە',true);return;}
  // Check duplicate email
  if(DB.get('sellers').find(s=>s.email===em)){showToast('ئەم ئیمەیڵە پێشتر تۆمارکراوە',true);return;}
  const sellers = DB.get('sellers');
  const newSeller = {id:DB.nextId('sellers'), name:n, email:em, phone:ph, password:pw, idFront:regIdFront, idBack:regIdBack, approved:false, createdAt:ts()};
  sellers.push(newSeller);
  DB.set('sellers', sellers);
  user = newSeller;
  saveSession(user);
  closeOv(); renderNav(); renderHome();
  showToast('ئەکاونتەکەت تۆمارکرا — چاوەڕێی پەسەندکردن');
}

function doLogin() {
  const em=el('l_email')?.value?.trim(), pw=el('l_pass')?.value?.trim();
  if(!em||!pw){showToast('ئیمەیڵ و پاسۆرد داخڵ بکە',true);return;}
  const found = DB.get('sellers').find(s=>s.email===em&&s.password===pw);
  if(!found){showToast('ئیمەیڵ یان پاسۆرد هەڵەیە',true);return;}
  user = found;
  saveSession(user);
  closeOv(); renderNav();
  if(activeTab==='home') renderHome(); else setTab(activeTab);
  showToast(`بەخێربێیت ${user.name}!`);
}

function logout() {
  user = null; saveSession(null); renderNav(); renderHome();
  showToast('بە خوداحافیزی دەرچووی');
}

// ═══════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════
user = loadSession();
const savedTab = localStorage.getItem('km_tab') || 'home';
setTab(savedTab);
</script>
</body>
</html>
